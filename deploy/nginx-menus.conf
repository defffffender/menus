# nginx-конфиг для Menus. Положить в /etc/nginx/sites-available/menus,
# затем: ln -s /etc/nginx/sites-available/menus /etc/nginx/sites-enabled/
# Замените menu.example.uz на ваш домен. HTTPS (блок 443) добавит certbot сам.

# Поддержка WebSocket-апгрейда (realtime-заказы). map допустим только в http-
# контексте — файл из sites-available подключается внутри http, так что ок.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name menu.example.uz www.menu.example.uz;

    # должно совпадать с DATA_UPLOAD_MAX_MEMORY_SIZE / запасом на картинки
    client_max_body_size 8m;

    # статика и медиа — отдаёт nginx напрямую, мимо Django
    location /static/ {
        alias /opt/menus/staticfiles/;
        access_log off;
        expires 30d;
    }
    location /media/ {
        alias /opt/menus/media/;
        access_log off;
        expires 7d;
    }

    # всё остальное (HTTP + WebSocket /ws/) — на daphne
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }
}
