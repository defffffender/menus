{% extends "admin/base.html" %}
{% load i18n %}

{% block content %}
<div class="mb-8">
  <!-- KPI cards -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
    <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
      <div id="c-restaurants" class="text-2xl font-bold text-gray-900 dark:text-gray-100">—</div>
      <div class="mt-1 text-xs font-medium uppercase tracking-wide text-gray-500">Заведений</div>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
      <div id="c-users" class="text-2xl font-bold text-gray-900 dark:text-gray-100">—</div>
      <div class="mt-1 text-xs font-medium uppercase tracking-wide text-gray-500">Пользователей</div>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
      <div id="c-orders-today" class="text-2xl font-bold text-gray-900 dark:text-gray-100">—</div>
      <div class="mt-1 text-xs font-medium uppercase tracking-wide text-gray-500">Заказов сегодня</div>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
      <div id="c-revenue" class="text-2xl font-bold text-gray-900 dark:text-gray-100">—</div>
      <div class="mt-1 text-xs font-medium uppercase tracking-wide text-gray-500">Выручка · 14 дней</div>
    </div>
  </div>

  <!-- charts -->
  <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
    <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900 lg:col-span-2">
      <h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-gray-500">Заказы и выручка · 14 дней</h2>
      <div class="relative h-60"><canvas id="ch-activity"></canvas></div>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
      <h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-gray-500">Пользователи по тарифам</h2>
      <div class="relative h-60"><canvas id="ch-plans"></canvas></div>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900 lg:col-span-2">
      <h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-gray-500">Заведения по дням</h2>
      <div class="relative h-44"><canvas id="ch-orders"></canvas></div>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
      <h2 class="mb-3 text-xs font-semibold uppercase tracking-wide text-gray-500">Новые заведения</h2>
      <div class="relative h-44"><canvas id="ch-reg"></canvas></div>
    </div>
  </div>
</div>

<!-- стандартный список приложений unfold -->
{% include "unfold/helpers/app_list_default.html" %}

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(function () {
  var BRAND = '#C75B39', FOREST = '#3E5C4A', CLAY = '#E0A04D', INK = '#2A2118';
  var fmt = new Intl.NumberFormat('ru-RU');
  function defaults() {
    if (!window.Chart) return;
    Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
    Chart.defaults.color = '#8a8077';
    Chart.defaults.plugins.legend.display = false;
  }
  fetch("{% url 'core:admin_dashboard_data' %}", { headers: { 'X-Requested-With': 'fetch' } })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      document.getElementById('c-restaurants').textContent = fmt.format(d.cards.restaurants);
      document.getElementById('c-users').textContent = fmt.format(d.cards.users);
      document.getElementById('c-orders-today').textContent = fmt.format(d.cards.orders_today);
      document.getElementById('c-revenue').textContent = fmt.format(d.cards.revenue_14d) + ' сум';
      if (!window.Chart) return;
      defaults();

      new Chart(document.getElementById('ch-activity'), {
        type: 'bar',
        data: { labels: d.labels, datasets: [
          { type: 'line', label: 'Выручка', data: d.revenue, borderColor: BRAND, backgroundColor: 'rgba(199,91,57,.1)', yAxisID: 'y1', tension: .35, fill: true, pointRadius: 0 },
          { label: 'Заказы', data: d.orders, backgroundColor: FOREST, borderRadius: 5, yAxisID: 'y' }
        ] },
        options: { responsive: true, maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, position: 'left', grid: { display: false } },
                    y1: { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false } } } }
      });
      new Chart(document.getElementById('ch-plans'), {
        type: 'doughnut',
        data: { labels: d.plans.map(function (p) { return p.label; }),
          datasets: [{ data: d.plans.map(function (p) { return p.n; }), backgroundColor: [BRAND, FOREST, CLAY, INK, '#9e431f'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, position: 'bottom' } } }
      });
      new Chart(document.getElementById('ch-orders'), {
        type: 'bar',
        data: { labels: d.labels, datasets: [{ data: d.orders, backgroundColor: FOREST, borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { display: false } } } }
      });
      new Chart(document.getElementById('ch-reg'), {
        type: 'line',
        data: { labels: d.labels, datasets: [{ data: d.registrations, borderColor: CLAY, backgroundColor: 'rgba(224,160,77,.15)', tension: .35, fill: true, pointRadius: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
      });
    })
    .catch(function () {});
})();
</script>
{% endblock %}
