<form method="post" action="{% url 'menu:dish_toggle' restaurant.slug dish.pk %}"
      hx-post="{% url 'menu:dish_toggle' restaurant.slug dish.pk %}" hx-swap="outerHTML"
      class="flex-none">
  {% csrf_token %}
  <button type="submit"
          class="inline-flex items-center gap-2 text-xs font-semibold px-3 py-1.5 rounded-full {% if dish.is_available %}bg-forest/10 text-forest{% else %}bg-line text-ink/50{% endif %}">
    <span class="relative w-[26px] h-[15px] rounded-full flex-none {% if dish.is_available %}bg-forest{% else %}bg-[#C7B9A3]{% endif %}">
      <span class="absolute top-[1.5px] w-3 h-3 rounded-full bg-white {% if dish.is_available %}right-[1.5px]{% else %}left-[1.5px]{% endif %}"></span>
    </span>
    {% if dish.is_available %}{{ t.menu_in_stock }}{% else %}{{ t.menu_stop }}{% endif %}
  </button>
</form>
