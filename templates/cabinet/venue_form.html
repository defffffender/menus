{% extends 'base.html' %}
{% block title %}{{ t.venue_new }} — Menus{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <a href="{% url 'restaurants:cabinet' %}" class="text-sm font-semibold text-ink/50 hover:text-brand">{{ t.venue_back }}</a>
  <div class="bg-white border border-line rounded-3xl p-8 shadow-sm mt-3">
    <h1 class="font-display text-2xl font-semibold mb-6">{{ t.venue_new }}</h1>
    {% if at_limit %}
    <div class="mb-5 rounded-xl px-4 py-3 text-sm bg-red-50 text-red-700 border border-red-200">
      {{ t.plan_limit_venues }}
      <a href="/#pricing" class="font-semibold underline">{{ t.plan_upgrade }}</a>
    </div>
    {% endif %}
    <form method="post" action="{% url 'restaurants:venue_create' %}" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.reg_name }}</label>
        <input name="name" required class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
      </div>
      <div>
        <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.reg_type }}</label>
        <select name="type" class="ui-select w-full border border-line rounded-xl px-4 py-3 bg-white focus:outline-none focus:border-brand">
          <option value="restaurant">{{ t.type_restaurant }}</option>
          <option value="cafe">{{ t.type_cafe }}</option>
          <option value="chaikhana">{{ t.type_chaikhana }}</option>
          <option value="fastfood">{{ t.type_fastfood }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.reg_city }}</label>
        <input name="city" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
      </div>
      <button class="w-full bg-brand text-white font-semibold rounded-xl py-3.5 hover:opacity-95">{{ t.venue_create_btn }}</button>
    </form>
  </div>
</div>
{% endblock %}
