{% extends 'base.html' %}
{% block title %}{{ t.verify_title }} — Menus{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-line rounded-3xl p-8 shadow-sm text-center">
  <h1 class="font-display text-2xl font-semibold mb-2">{{ t.verify_title }}</h1>
  <p class="text-sm text-ink/50 mb-6">{{ t.verify_sent }} <span class="font-semibold text-ink">{{ phone }}</span></p>
  <form method="post" action="{% url 'accounts:verify' %}" class="space-y-4">
    {% csrf_token %}
    <input name="code" inputmode="numeric" autocomplete="one-time-code" required
           maxlength="4" pattern="\d{4}"
           oninput="this.value = this.value.replace(/\D/g, '').slice(0, 4)"
           class="w-full text-center tracking-[0.5em] text-2xl font-semibold border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand"
           placeholder="••••">
    <button class="w-full bg-brand text-white font-semibold rounded-xl py-3.5 hover:opacity-95">{{ t.verify_submit }}</button>
  </form>

  <!-- повторная отправка: таймер обратного отсчёта, затем кнопка -->
  <div class="mt-5 text-sm">
    <p id="resend-timer" class="text-ink/40" {% if not resend_in %}hidden{% endif %}>
      {{ t.verify_resend_in }} <span id="resend-left" class="font-semibold tabular-nums">{{ resend_in }}</span> {{ t.verify_sec }}
    </p>
    <form id="resend-form" method="post" action="{% url 'accounts:resend' %}" {% if resend_in %}hidden{% endif %}>
      {% csrf_token %}
      <button class="font-semibold text-brand hover:underline">{{ t.verify_resend }}</button>
    </form>
  </div>
  <script>
    (function () {
      var left = {{ resend_in|default:0 }};
      var timer = document.getElementById('resend-timer');
      var form = document.getElementById('resend-form');
      var out = document.getElementById('resend-left');
      if (left <= 0) return;
      var i = setInterval(function () {
        left--;
        if (left <= 0) {
          clearInterval(i);
          timer.hidden = true;
          form.hidden = false;
        } else {
          out.textContent = left;
        }
      }, 1000);
    })();
  </script>
</div>
{% endblock %}
