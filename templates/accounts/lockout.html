<!DOCTYPE html>
<html lang="{{ LANG }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% include 'partials/favicon.html' %}
<title>{{ t.err_locked_title }} — Menus</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:'#C75B39', sand:'#FBF6EE', ink:'#2A2118', line:'#ECE3D5' },
    fontFamily: { display:['Spectral','serif'], body:['Golos Text','sans-serif'] }
  } } }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="font-body bg-sand text-ink min-h-screen flex items-center justify-center px-6">
  <div class="max-w-sm w-full text-center">
    <div class="w-16 h-16 mx-auto rounded-2xl bg-brand/10 text-brand flex items-center justify-center mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 0h10.5a2.25 2.25 0 012.25 2.25v6.75a2.25 2.25 0 01-2.25 2.25H6.75a2.25 2.25 0 01-2.25-2.25v-6.75a2.25 2.25 0 012.25-2.25z"/>
      </svg>
    </div>
    <h1 class="font-display text-2xl font-semibold mb-2">{{ t.err_locked_title }}</h1>
    <p class="text-ink/60 leading-relaxed mb-6">{{ t.err_locked_text }}</p>
    <div class="flex items-center justify-center gap-4 text-sm font-semibold">
      <a href="{% url 'accounts:login' %}" class="text-brand hover:opacity-80">{{ t.nav_login }}</a>
      <span class="text-ink/20">·</span>
      <a href="{% url 'accounts:password_reset' %}" class="text-ink/50 hover:text-ink">{{ t.login_forgot }}</a>
    </div>
  </div>
</body>
</html>
