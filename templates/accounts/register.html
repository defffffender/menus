{% extends 'base.html' %}
{% block title %}{{ t.lead_title }} — Menus{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-line rounded-3xl p-8 shadow-sm">
  <h1 class="font-display text-2xl font-semibold mb-1">{{ t.lead_title }}</h1>
  <p class="text-ink/50 text-sm mb-6">{{ t.lead_subtitle }}</p>
  <form method="post" action="{% url 'accounts:register' %}" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.lead_name }}</label>
      <input name="name" value="{{ values.name }}" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
    </div>
    <div>
      <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.lead_venue }}</label>
      <input name="venue" value="{{ values.venue }}" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.reg_city }}</label>
        <input name="city" value="{{ values.city }}" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
      </div>
      <div>
        <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.reg_phone }}</label>
        <input name="phone" required data-phone-mask inputmode="tel" maxlength="19" value="{{ values.phone }}" placeholder="+998 90 123-45-67" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
      </div>
    </div>
    <div>
      <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.lead_comment }}</label>
      <textarea name="comment" rows="2" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">{{ values.comment }}</textarea>
    </div>
    <button class="w-full bg-brand text-white font-semibold rounded-xl py-3.5 hover:opacity-95">{{ t.lead_submit }}</button>
  </form>
  <p class="text-center text-sm text-ink/50 mt-5">{{ t.reg_have_account }}
    <a href="{% url 'accounts:login' %}" class="text-brand font-semibold">{{ t.nav_login }}</a>
  </p>
</div>
{% include 'partials/phone_mask.html' %}
{% endblock %}
