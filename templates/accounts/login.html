{% extends 'base.html' %}
{% block title %}{{ t.login_title }} — Menus{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-line rounded-3xl p-8 shadow-sm">
  <h1 class="font-display text-2xl font-semibold mb-6">{{ t.login_title }}</h1>
  <form method="post" action="{% url 'accounts:login' %}" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.reg_phone }}</label>
      <input name="phone" required data-phone-mask inputmode="tel" maxlength="19" value="{{ phone }}" placeholder="+998 90 123-45-67" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
    </div>
    <div>
      <div class="flex items-center justify-between mb-1.5">
        <label class="block text-sm font-semibold text-ink/70">{{ t.login_password }}</label>
        <a href="{% url 'accounts:password_reset' %}" class="text-xs text-brand font-semibold">{{ t.login_forgot }}</a>
      </div>
      <input name="password" type="password" required autocomplete="current-password" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
    </div>
    <button class="w-full bg-brand text-white font-semibold rounded-xl py-3.5 hover:opacity-95">{{ t.login_submit }}</button>
  </form>
  <p class="text-center text-sm text-ink/50 mt-5">{{ t.login_no_account }}
    <a href="{% url 'accounts:register' %}" class="text-brand font-semibold">{{ t.lead_title }}</a>
  </p>
</div>
{% include 'partials/phone_mask.html' %}
{% endblock %}
