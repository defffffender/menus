{% extends 'base.html' %}
{% block title %}{{ t.pwreset_title }} — Menus{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-line rounded-3xl p-8 shadow-sm">
  <h1 class="font-display text-2xl font-semibold mb-2">{{ t.pwreset_title }}</h1>
  <p class="text-sm text-ink/50 mb-6">{{ t.pwreset_hint }}</p>
  <form method="post" action="{% url 'accounts:password_reset' %}" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-semibold text-ink/70 mb-1.5">{{ t.reg_phone }}</label>
      <input name="phone" required data-phone-mask inputmode="tel" maxlength="19" placeholder="+998 90 123-45-67" class="w-full border border-line rounded-xl px-4 py-3 focus:outline-none focus:border-brand">
    </div>
    <button class="w-full bg-brand text-white font-semibold rounded-xl py-3.5 hover:opacity-95">{{ t.pwreset_submit }}</button>
  </form>
  <p class="text-center text-sm text-ink/50 mt-5">
    <a href="{% url 'accounts:login' %}" class="text-brand font-semibold">{{ t.nav_login }}</a>
  </p>
</div>
{% include 'partials/phone_mask.html' %}
{% endblock %}
