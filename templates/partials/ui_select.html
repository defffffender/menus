{% comment %}
Кастомный выпадающий список. Прогрессивно заменяет нативный <select class="ui-select">
на оформленный по дизайну дропдаун. Нативный select остаётся в DOM (визуально скрыт) —
он несёт name/value и уходит с формой; при выборе мы шлём ему событие 'change',
чтобы продолжали работать inline-обработчики (onchange="this.form.submit()").

Vanilla JS (без Alpine) — работает и в публичной части, и в кабинете.
{% endcomment %}
<style>
  select.ui-select.ui-hidden{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;opacity:0;pointer-events:none;}
  .ui-select-wrap{position:relative;}
  .ui-select-btn{display:flex;align-items:center;gap:.5rem;text-align:left;}
  .ui-select-label{flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ui-select-caret{flex:none;color:#9A8C78;font-size:.62em;transition:transform .18s;}
  .ui-select-wrap.open .ui-select-btn{border-color:#C75B39!important;box-shadow:0 0 0 3px rgba(199,91,57,.12);}
  .ui-select-wrap.open .ui-select-caret{transform:rotate(180deg);}
  .ui-select-panel{position:absolute;left:0;right:0;top:calc(100% + 5px);z-index:60;
    background:#fff;border:1px solid #ECE3D5;border-radius:.75rem;
    box-shadow:0 14px 34px -10px rgba(42,33,24,.28);padding:.3rem;
    max-height:16rem;overflow:auto;animation:uiSelIn .14s cubic-bezier(.4,0,.2,1);}
  @keyframes uiSelIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .ui-select-opt{display:flex;align-items:center;gap:.5rem;padding:.5rem .625rem;border-radius:.55rem;
    color:#2A2118;cursor:pointer;line-height:1.25;}
  .ui-select-opt:hover,.ui-select-opt.active{background:#FBF6EE;}
  .ui-select-opt.selected{color:#C75B39;font-weight:600;}
  .ui-select-opt.selected::after{content:'✓';margin-left:auto;font-size:.85em;}
  .ui-select-opt.disabled{opacity:.4;cursor:default;background:none;}
</style>
<script>
(function(){
  function build(sel){
    if(sel.dataset.uiEnhanced) return;
    sel.dataset.uiEnhanced = '1';

    var fontSize = getComputedStyle(sel).fontSize;

    var wrap = document.createElement('div');
    wrap.className = 'ui-select-wrap';
    sel.parentNode.insertBefore(wrap, sel);
    wrap.appendChild(sel);
    sel.classList.add('ui-hidden');

    var btn = document.createElement('button');
    btn.type = 'button';
    // переносим оформление нативного select на кнопку — сохраняем размеры/отступы каждого инстанса
    btn.className = sel.className.replace('ui-hidden','').replace('ui-select','') + ' ui-select-btn';
    if(sel.disabled) btn.disabled = true;
    btn.innerHTML = '<span class="ui-select-label"></span><span class="ui-select-caret">▾</span>';
    wrap.appendChild(btn);
    var labelEl = btn.querySelector('.ui-select-label');

    var panel = document.createElement('div');
    panel.className = 'ui-select-panel';
    panel.style.display = 'none';
    panel.style.fontSize = fontSize;
    panel.setAttribute('role','listbox');
    wrap.appendChild(panel);

    var isOpen = false, activeIdx = -1;

    function syncLabel(){
      var opt = sel.options[sel.selectedIndex];
      labelEl.textContent = opt ? opt.textContent : '';
    }

    function renderOptions(){
      panel.innerHTML = '';
      Array.prototype.forEach.call(sel.options, function(opt, i){
        var o = document.createElement('div');
        o.className = 'ui-select-opt' + (i===sel.selectedIndex?' selected':'') + (opt.disabled?' disabled':'');
        o.textContent = opt.textContent;
        o.setAttribute('role','option');
        o.addEventListener('mouseenter', function(){ setActive(i); });
        o.addEventListener('click', function(){ choose(i); });
        panel.appendChild(o);
      });
    }

    function setActive(i){
      activeIdx = i;
      Array.prototype.forEach.call(panel.children, function(el, idx){
        el.classList.toggle('active', idx===i);
      });
    }

    function choose(i){
      var opt = sel.options[i];
      if(!opt || opt.disabled) return;
      if(sel.selectedIndex !== i){
        sel.selectedIndex = i;
        sel.dispatchEvent(new Event('change', {bubbles:true}));
        sel.dispatchEvent(new Event('input', {bubbles:true}));
      }
      syncLabel();
      close();
    }

    function open(){
      renderOptions();
      panel.style.display = 'block';
      wrap.classList.add('open');
      isOpen = true;
      setActive(sel.selectedIndex);
      var cur = panel.children[sel.selectedIndex];
      if(cur) cur.scrollIntoView({block:'nearest'});
      document.addEventListener('mousedown', outside, true);
    }
    function close(){
      panel.style.display = 'none';
      wrap.classList.remove('open');
      isOpen = false;
      document.removeEventListener('mousedown', outside, true);
    }
    function outside(e){ if(!wrap.contains(e.target)) close(); }

    btn.addEventListener('click', function(){ isOpen ? close() : open(); });
    btn.addEventListener('keydown', function(e){
      if(e.key==='ArrowDown'){ e.preventDefault(); if(!isOpen){ open(); } else { setActive(Math.min(activeIdx+1, sel.options.length-1)); } }
      else if(e.key==='ArrowUp'){ e.preventDefault(); if(isOpen){ setActive(Math.max(activeIdx-1, 0)); } }
      else if(e.key==='Enter'||e.key===' '){ e.preventDefault(); if(!isOpen){ open(); } else { choose(activeIdx); } }
      else if(e.key==='Escape'){ close(); }
    });
    sel.addEventListener('change', syncLabel);

    syncLabel();
  }

  function enhanceAll(root){
    (root||document).querySelectorAll('select.ui-select').forEach(build);
  }
  if(document.readyState!=='loading') enhanceAll();
  else document.addEventListener('DOMContentLoaded', function(){ enhanceAll(); });
  document.addEventListener('htmx:afterSwap', function(e){ enhanceAll(e.target); });
})();
</script>
