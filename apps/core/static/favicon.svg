<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Menus app-icon: 3×3 модульная сетка (намёк на QR), в центре звезда-хатам -->
  <rect width="96" height="96" rx="22" fill="#C75B39"/>
  <g>
    <!-- углы — песочные -->
    <rect x="17"   y="17"   width="17" height="17" rx="3.5" fill="#FBF6EE"/>
    <rect x="62"   y="17"   width="17" height="17" rx="3.5" fill="#FBF6EE"/>
    <rect x="17"   y="62"   width="17" height="17" rx="3.5" fill="#FBF6EE"/>
    <rect x="62"   y="62"   width="17" height="17" rx="3.5" fill="#FBF6EE"/>
    <!-- рёбра — светлая терракота -->
    <rect x="39.5" y="17"   width="17" height="17" rx="3.5" fill="#E58E64"/>
    <rect x="17"   y="39.5" width="17" height="17" rx="3.5" fill="#E58E64"/>
    <rect x="62"   y="39.5" width="17" height="17" rx="3.5" fill="#E58E64"/>
    <rect x="39.5" y="62"   width="17" height="17" rx="3.5" fill="#E58E64"/>
    <!-- центр — звезда-хатам (квадрат + повёрнутый квадрат) -->
    <rect x="39.5" y="39.5" width="17" height="17" rx="2.5" fill="#FBF6EE"/>
    <rect x="39.5" y="39.5" width="17" height="17" rx="2.5" fill="#FBF6EE" transform="rotate(45 48 48)"/>
  </g>
</svg>
